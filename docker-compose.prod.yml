# Production Docker Compose
# This is for deploying the entire stack on a single VM
# For cloud deployments, use managed databases instead

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: clinical-trial-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-aact}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DATABASE:-aact}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - trial-assistant-network
    restart: always

  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.16
    container_name: clinical-trial-elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"  # Increased for production
      - xpack.security.enabled=false
      - cluster.name=clinical-trials
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - trial-assistant-network
    restart: always

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_IMAGE_NAME:-clinical-trial-assistant}:${VERSION:-latest}
    container_name: clinical-trial-assistant-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DATABASE=${POSTGRES_DATABASE:-aact}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ES_INDEX_NAME=${ES_INDEX_NAME:-aact}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - TEMPERATURE=${TEMPERATURE:-0.0}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-clinical-trial-matching}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - trial-assistant-network
    # No volume mounts in production for security

volumes:
  postgres_data:
    driver: local
  elasticsearch_data:
    driver: local

networks:
  trial-assistant-network:
    driver: bridge
